name: Radar de Marcas Competidoras - Corrida Mensual

on:
  schedule:
    - cron: "0 11 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  radar-mensual:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PENTA_USER: ${{ secrets.PENTA_USER }}
      PENTA_PASS: ${{ secrets.PENTA_PASS }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      NOTION_IMPORTADORES_DB_ID: ${{ secrets.NOTION_IMPORTADORES_DB_ID }}
      WA_API_URL: ${{ secrets.WA_API_URL }}
      WA_TOKEN: ${{ secrets.WA_TOKEN }}
      WA_CELULAR: ${{ secrets.WA_CELULAR }}
      STREAMLIT_DASHBOARD_URL: ${{ secrets.STREAMLIT_DASHBOARD_URL }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar navegador Chromium (Playwright)
        run: playwright install --with-deps chromium

      - name: Ejecutar corrida mensual (scraper + análisis + WhatsApp)
        run: python main.py

      - name: Commitear reporte y datos actualizados
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add reporte_marcas_mensual.xlsx downloads/ || true
          git diff --cached --quiet || git commit -m "chore: actualiza reporte mensual $(date +'%Y-%m')"
          git push

      - name: Subir reporte como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-marcas-mensual
          path: reporte_marcas_mensual.xlsx
          retention-days: 90
